<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<!--suppress CssUnusedSymbol -->
		<style>
			.hidden {
				display: none !important;
			}

			:root {
				/* catppuccin palette */
				--rosewater: hsl(10, 56%, 91%) !important;
				--flamingo: hsl(0, 59%, 88%) !important;
				--pink: hsl(316, 72%, 86%) !important;
				--mauve: hsl(267, 84%, 81%) !important;
				--red: hsl(343, 81%, 75%) !important;
				--maroon: hsl(350, 65%, 78%) !important;
				--peach: hsl(23, 92%, 76%) !important;
				--yellow: hsl(41, 86%, 83%) !important;
				--green: hsl(115, 54%, 76%) !important;
				--teal: hsl(170, 57%, 73%) !important;
				--sky: hsl(189, 71%, 73%) !important;
				--sapphire: hsl(199, 76%, 69%) !important;
				--blue: hsl(217, 92%, 76%) !important;
				--lavender: hsl(232, 97%, 85%) !important;
				--text: hsl(226, 64%, 88%) !important;
				--subtext1: hsl(227, 35%, 80%) !important;
				--subtext0: hsl(228, 24%, 72%) !important;
				--overlay2: hsl(228, 17%, 64%) !important;
				--overlay1: hsl(230, 13%, 56%) !important;
				--overlay0: hsl(231, 11%, 47%) !important;
				--surface2: hsl(233, 12%, 39%) !important;
				--surface1: hsl(234, 13%, 31%) !important;
				--surface0: hsl(237, 16%, 23%) !important;
				--base: hsl(240, 21%, 15%) !important;
				--mantle: hsl(240, 21%, 12%) !important;
				--crust: hsl(240, 23%, 9%) !important;
				--theme-color: var(--blue) !important;

				font-family: Arial, serif;
			}
			body {
				color: var(--subtext1) !important;
				background-color: var(--base) !important;
			}

			.spacing {
				display: inline-flex;
				gap: 4px;
			}

			.gui-button-group {
				position: absolute;
				top: 10px;
				right: 10px;
			}

			.anki-button {
				background-color: var(--surface0);
				color: var(--text);
				text-align: center;
				cursor: pointer;
				border: 2px solid var(--surface1);
				align-self: center;
			}

			.headword {
				display: inline-flex;
				gap: 8px;
				font-size: 28px;
				background-color: var(--base);
				border: 5px solid var(--base);
				border-radius: 8px;
				margin-top: 8px;
			}

			.left-bracket {
				margin-left: -15px;
			}

			.right-bracket {
				margin-right: -15px;
			}

			.bracket {
				font-weight: 20;
				text-shadow: 0 0 1px #000;
				pointer-events: none;
				user-select: none;
			}

			.empty-hanzi {
				color: var(--surface2);
			}

			.pinyin-rt {
				color: var(--surface0);
				-webkit-transition: color .3s ease-out;
				-moz-transition: color .3s ease-out;
				-o-transition: color .3s ease-out;
				transition: color .3s ease-out;
			}

			.pinyin-rt.on {
				color: var(--text);
			}

			ruby:has(.pinyin-rt:hover) .pinyin-rt {
				color: var(--text);
			}

			.definition {
				background-color: var(--base);
				border: 5px solid var(--base);
				border-radius: 8px;
				padding-left: 4px;
			}

			.def-title {
				font-size: 22px;
				color: var(--theme-color);
			}

			.def-list {
				padding-left: 0;
				margin: 0;

				list-style-type: none; /* Hides default marker */
				counter-reset: item-counter;
			}

			.def-list li::before {
				counter-increment: item-counter;
				content: counter(item-counter);
				color: var(--overlay0);
				font-weight: bold;
				padding-right: 5px;

			}

			li {
				margin-top: 5px;
				margin-bottom: 5px;
			}

			li .def-details {
				display: inline-block;
				vertical-align: top;
				width: 95%; /* Adjust so the number has room on the left */
			}

			.def-details {
				display: inline-block;
			}

			.def-details > summary {
				font-weight: bold;
				list-style: none;
			}
			.def-details > summary::-webkit-details-marker {
				display: none;
			}

			.def-details > :not(summary) {
				border-left: 2px solid var(--theme-color);
				margin-left: -13px;
				padding-left: 13px;
			}

			.sentence-container {
				margin-top: 2px;
				margin-bottom: 2px;
			}

			.en-sentence {
				display: inline-block;
				color: var(--subtext0);
				width: 0;
				vertical-align: bottom;
				white-space: nowrap;
				overflow: hidden;

				interpolate-size: allow-keywords;
				-webkit-transition: width .3s ease-out;
				-moz-transition: width .3s ease-out;
				-o-transition: width .3s ease-out;
				transition: width .3s ease-out;
			}

			.sentence-container:hover .en-sentence {
				width: auto;
			}

			.zh-sentence {
				display: inline-block;
				background: var(--base);
				z-index: 1;
				padding-right: 4px;
			}

			.en-sent-dummy {
				display: inline-block;
				color: #00000000;
				width: auto;
				vertical-align: bottom;
				white-space: nowrap;
				overflow: hidden;

				user-select: none;

				interpolate-size: allow-keywords;
				-webkit-transition: width .3s ease-out;
				-moz-transition: width .3s ease-out;
				-o-transition: width .3s ease-out;
				transition: width .3s ease-out;
			}

			.sentence-container:hover .en-sent-dummy {
				width: 0;
			}
		</style>
		<script>

			/**
			 * @param {Element} element
			 * @param {string} hanzi
			 * @param {string} pinyin
			 */
			function fillHanziPinyin(element, hanzi, pinyin) {
				element.firstChild.textContent = hanzi;
				element.lastChild.textContent = pinyin;
			}

			/**
			 * @param {string} hanzi
			 * @param {string} pinyin
			 */
			function getHanziPinyin(hanzi, pinyin) {
				const ruby = document.createElement("ruby");

				const span = document.createElement("span");

				const rt = document.createElement("rt");
				rt.classList.add("pinyin-rt");

				ruby.appendChild(span);
				ruby.appendChild(rt);


				ruby.addEventListener("click", (event) => {
					if (event.button === 0) {
						rt.classList.toggle("on");
					}
				})
				fillHanziPinyin(ruby, hanzi, pinyin);
				return ruby;
			}

			/**
			 * @param {Array} characters
			 * @param {string} set
			 */
			function getWord(characters, set) {
				const span = document.createElement("span");
				fillWord(span, characters, set);
				return span;
			}

			/**
			 * @param {Element} element
			 * @param {Array} characters
			 * @param {string} set
			 */
			function fillWord(element, characters, set) {
				let i = 0;
				const el_len = element.children.length;
				for (; i < characters.length; i++) {
					if (i < el_len) {
						const curr = element.children[i];
						curr.classList.remove("hidden");
						fillHanziPinyin(curr, characters[i][set], characters[i]["pinyin"]);
					} else {
						element.appendChild(getHanziPinyin(characters[i][set], characters[i]["pinyin"]));
					}
				}
				for (; i < el_len; i++) {
					element.children[i].classList.add("hidden");
				}
			}

			/**
             * @param {Element} element
             * @param {Array} words
             * @param {string} set
             */
			function fillHeadword(element, words, set) {
				let i = 0;
				const el_len = element.children.length;
				for (; i < words.length; i++) {
					if (i < el_len) {
						const curr = element.children[i];
						curr.classList.remove("hidden");
						fillWord(curr, words[i], set);
					} else {
						element.appendChild(getWord(words[i], set));
					}
				}
				for (; i < el_len; i++) {
					element.children[i].classList.add("hidden");
				}
			}

			/**
			 * @param {Element} element
			 * @param {Array} words
			 * @param {Array} definitions
			 * @param {string} contextWord
			 * @param {string} contextSentence
			 */
			function fillAnkiButton(element, words, definitions, contextWord, contextSentence) {
				element.addEventListener("click", () => {
					const jsonObject = {
						key: "ankiadd",
						character: words.flat().map(c => c["simp"]).join(""),
						word: contextWord,
						pinyin: words.flat().map(c => c["pinyin"]).join(" "),
						sentence: contextSentence,
						definition: definitions.join('\n')
					};
					// noinspection JSUnresolvedReference
					window.chrome.webview.postMessage(jsonObject); // is part of Microsoft Edge Webview2
				});
				element.textContent = "+";
			}

			/**
			 * @param {Element} element
			 * @param {Array} words
			 * @param {Array} definitions
			 * @param {string} contextWord
			 * @param {string} contextSentence
			 */
			function fillGuiButtonList(element, words, definitions, contextWord, contextSentence) {
				const ankiButtonList = element.getElementsByClassName("anki-button");
				if (ankiButtonList.length === 0) {
					const newAnkiButton = document.createElement("button");
					newAnkiButton.classList.add("anki-button");
					element.appendChild(newAnkiButton);
					newAnkiButton.setAttribute("title", "add anki card");
					fillAnkiButton(newAnkiButton, words, definitions, contextWord, contextSentence);
				} else {
					fillAnkiButton(ankiButtonList[0], words, definitions, contextWord, contextSentence);
				}
			}

			/**
             * @param {Element} element
             * @param {Array} words
             * @param {Array} definitions
             * @param {string} contextWord
             * @param {string} contextSentence
             */
			function fillHeadwords(element, words, definitions, contextWord, contextSentence) {
				fillHeadword(element.firstElementChild, words, "simp");
				fillHeadword(element.firstElementChild.nextElementSibling, words, "trad");
				const guiButtonList = element.lastElementChild;
				fillGuiButtonList(guiButtonList, words, definitions, contextWord, contextSentence);
			}

			/**
             * @param {Element} definitions_container
             * @param {Array} definitions_list
             */
			function fillDefinitionsContainer(definitions_container, definitions_list) {
				let ol;
				const olList = definitions_container.getElementsByClassName("def-list");
				if (olList.length === 0) {
					ol = document.createElement("ol");
					ol.classList.add("def-list");
					definitions_container.appendChild(ol);
				} else {
					ol = olList[0];
				}

				const liList = ol.children;
				let i = 0;
				for (; i < definitions_list.length; i++) {
					if (i >= liList.length) {
						const span = document.createElement("span");
						span.textContent = definitions_list[i].toString();

						const li = document.createElement("li");
						li.appendChild(span);
						ol.appendChild(li)
					} else {
						const li = liList[i];
						li.classList.remove("hidden");
						const span = li.firstChild;
						span.textContent = definitions_list[i].toString();
					}
				}
				for (; i + 1 < liList.length; i++) {
					liList[i + 1].classList.add("hidden");
				}
			}

			/**
             * @param {Element} entry
             * @param {Array} words
             * @param {Array} definitions
             * @param {string} contextWord
             * @param {string} contextSentence
             */
			function fillEntry(entry, words, definitions, contextWord, contextSentence) {
				{
					const headwordList = entry.getElementsByClassName("headword");
					if (headwordList.length === 0) {
						const newHeadword = document.createElement("div");
						newHeadword.classList.add("headword");
						entry.appendChild(newHeadword);
						newHeadword.appendChild(document.createElement("span"));
						newHeadword.appendChild(document.createElement("span"));
						newHeadword.firstElementChild.classList.add("spacing");
						newHeadword.lastElementChild.classList.add("spacing");
						newHeadword.appendChild(document.createElement("span"));
						newHeadword.lastElementChild.classList.add("gui-button-group");
						fillHeadwords(newHeadword, words, definitions, contextWord, contextSentence);
					} else {
						fillHeadwords(headwordList[0], words, definitions, contextWord, contextSentence);
					}
				}

				{
					const defContainerList = entry.getElementsByClassName("definitions-container");
					if (defContainerList.length === 0) {
						const newDefContainer = document.createElement("div");
						newDefContainer.classList.add("definitions-container");
						entry.appendChild(newDefContainer);
						fillDefinitionsContainer(newDefContainer, definitions);
					} else {
						fillDefinitionsContainer(defContainerList[0], definitions);
					}
				}
			}
			// function is called in tooltip.cpp
			// noinspection JSUnusedGlobalSymbols
			function setPage(page_data) {
				const entryContainer = document.getElementById("entry-container");
				const entryList = entryContainer.children;

				let i = 0;
				for (; i < page_data.length; i++) {
					/**
					 * @type {string}
					 */
					const contextWord = page_data[i]["c_word"];
					/**
					 * @type {string}
					 */
					const contextSentence = page_data[i]["c_sent"];
					/**
					 * @type {Array}
					 */
					const words = page_data[i]["words"];
					/**
					 * @type {Array}
					 */
					const definitions = page_data[i]["def"];

					if (entryList.length <= i) {
						const newEntry = document.createElement("div");
						newEntry.classList.add("entry");
						newEntry.addEventListener("contextmenu", (event) => {
							const jsonObject = {
								key: "contextmenu",
								x: event.screenX,
								y: event.screenY,
								character: words.flat().map(c => c["simp"]).join(""),
								word: contextWord,
								pinyin: words.flat().map(c => c["pinyin"]).join(" "),
								sentence: contextSentence,
								definition: definitions.join('\n')
							};
							// noinspection JSUnresolvedReference
							window.chrome.webview.postMessage(jsonObject); // is part of Microsoft Edge Webview2
							event.preventDefault();
						});

						entryContainer.appendChild(newEntry);
						fillEntry(newEntry, words, definitions, contextWord, contextSentence);
					} else {
						entryContainer.children[i].classList.remove("hidden");
						fillEntry(entryList[i], words, definitions, contextWord, contextSentence);
					}
				}

				for (; i < entryList.length; i++) {
					entryContainer.children[i].classList.add("hidden");
				}
			}
		</script>
		<title></title>
	</head>
	<body>
		<div id="entry-container">
		</div>
	</body>
</html>
